<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💜 TOTODO - 비밀번호 초기화 💜</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- 로고 -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#a200cb;border-radius:10px;width:36px;height:36px;text-align:center;vertical-align:middle;">
                    <span style="color:#ffffff;font-size:18px;font-weight:700;line-height:36px;">T</span>
                  </td>
                  <td style="padding-left:10px;vertical-align:middle;">
                    <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:-0.3px;">TOTODO</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- 카드 -->
          <tr>
            <td style="background-color:#18181b;border-radius:20px;padding:40px 36px;border:1px solid rgba(255,255,255,0.08);">

              <table width="100%" cellpadding="0" cellspacing="0">
                <!-- 아이콘 -->
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <div style="width:56px;height:56px;background-color:rgba(162,0,203,0.15);border-radius:50%;display:inline-block;text-align:center;line-height:56px;font-size:26px;">
                      🔑
                    </div>
                  </td>
                </tr>

                <!-- 제목 -->
                <tr>
                  <td align="center" style="padding-bottom:10px;">
                    <h1 style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">비밀번호 재설정</h1>
                  </td>
                </tr>

                <!-- 본문 -->
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <p style="margin:0;font-size:14px;color:#a1a1aa;line-height:1.7;text-align:center;">
                      비밀번호 재설정을 요청하셨습니다.<br />
                      아래 버튼을 눌러 새 비밀번호를 설정해 주세요.<br />
                      <span style="color:#71717a;font-size:13px;">이 링크는 1시간 후 만료됩니다.</span>
                    </p>
                  </td>
                </tr>

                <!-- 버튼 -->
                <tr>
                  <td align="center" style="padding-bottom:28px;">
                    <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=recovery&next=/auth/reset-password"
                       style="display:inline-block;background-color:#a200cb;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:12px;letter-spacing:-0.2px;">
                      비밀번호 재설정하기
                    </a>
                  </td>
                </tr>

                <!-- 구분선 -->
                <tr>
                  <td style="border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;">
                    <p style="margin:0 0 8px;font-size:12px;color:#71717a;text-align:center;">
                      버튼이 동작하지 않으면 아래 링크를 브라우저에 복사해 주세요.
                    </p>
                    <p style="margin:0;font-size:11px;color:#a200cb;text-align:center;word-break:break-all;">
                      {{ .SiteURL }}/auth/callback?code={{ .Token }}&amp;next=/auth/reset-password
                    </p>
                  </td>
                </tr>

                <!-- 보안 안내 -->
                <tr>
                  <td style="padding-top:20px;">
                    <p style="margin:0;font-size:12px;color:#71717a;text-align:center;line-height:1.6;">
                      본인이 요청하지 않은 메일이라면 무시하셔도 됩니다.<br />계정은 안전하게 유지됩니다.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#52525b;">
                © 2025 TOTODO. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
