<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOTODO 이메일 인증</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;">

  <!-- 바깥 래퍼 -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0a0a0a;min-height:100vh;">
    <tr>
      <td align="center" style="padding:48px 16px;">

        <!-- 카드 -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;background-color:#141414;border-radius:20px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;">

          <!-- 상단 브랜드 헤더 -->
          <tr>
            <td align="center" style="padding:40px 40px 32px;background:linear-gradient(135deg,#1a001f 0%,#120018 50%,#0d000f 100%);">
              <!-- 로고 박스 -->
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="width:64px;height:64px;background-color:#a200cb;border-radius:16px;font-size:28px;font-weight:700;color:#ffffff;line-height:64px;box-shadow:0 8px 32px rgba(162,0,203,0.4);">
                    도
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-size:26px;font-weight:700;color:#ffffff;letter-spacing:0.12em;">TOTODO</p>
            </td>
          </tr>

          <!-- 구분선 -->
          <tr>
            <td style="height:1px;background:linear-gradient(90deg,transparent,rgba(162,0,203,0.4),transparent);"></td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <p style="margin:0 0 8px;font-size:22px;font-weight:700;color:#ffffff;line-height:1.3;">이메일 주소를 인증해주세요</p>
              <p style="margin:0 0 28px;font-size:15px;color:#9ca3af;line-height:1.6;">
                TOTODO 가입을 거의 완료했어요!<br />
                아래 버튼을 눌러 이메일 주소를 확인하고<br />
                서비스를 시작해보세요.
              </p>

              <!-- CTA 버튼 -->
              <table cellpadding="0" cellspacing="0" border="0" style="width:100%;">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       target="_blank"
                       style="display:inline-block;width:100%;max-width:360px;padding:16px 0;background-color:#a200cb;color:#ffffff;font-size:16px;font-weight:700;text-decoration:none;border-radius:12px;text-align:center;letter-spacing:0.02em;box-sizing:border-box;box-shadow:0 4px 24px rgba(162,0,203,0.35);">
                      이메일 인증하기
                    </a>
                  </td>
                </tr>
              </table>

              <!-- 링크 안내 -->
              <p style="margin:24px 0 0;font-size:13px;color:#6b7280;line-height:1.6;text-align:center;">
                버튼이 작동하지 않으면 아래 링크를 브라우저에 직접 붙여넣으세요.
              </p>
              <p style="margin:8px 0 0;font-size:12px;color:#a200cb;word-break:break-all;text-align:center;line-height:1.6;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <!-- 구분선 -->
          <tr>
            <td style="height:1px;margin:0 40px;background-color:rgba(255,255,255,0.06);"></td>
          </tr>

          <!-- 주의 문구 -->
          <tr>
            <td style="padding:24px 40px;">
              <table cellpadding="0" cellspacing="0" border="0" style="width:100%;background-color:rgba(162,0,203,0.08);border-radius:10px;border:1px solid rgba(162,0,203,0.2);">
                <tr>
                  <td style="padding:16px 18px;">
                    <p style="margin:0;font-size:13px;color:#d8b4fe;line-height:1.6;">
                      ⚠️ 이 링크는 <strong>24시간</strong> 동안 유효합니다.<br />
                      본인이 요청하지 않은 경우 이 메일을 무시해주세요.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td align="center" style="padding:0 40px 36px;">
              <p style="margin:0;font-size:12px;color:#4b5563;line-height:1.8;">
                이 메일은 TOTODO 서비스에서 자동 발송되었습니다.<br />
                문의: support@totodo.kr
              </p>
            </td>
          </tr>

        </table>
        <!-- /카드 -->

      </td>
    </tr>
  </table>

</body>
</html>
